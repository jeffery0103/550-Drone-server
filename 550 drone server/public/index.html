<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>550 空母 | 戰略遙測中心</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white;}
        #map { width: 100vw; height: 100vh; transform-origin: center center; transition: transform 0.3s ease; }
        
        /* 浮動的戰情儀表板 */
        #dashboard {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
            width: 250px;
        }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 16px;}
        .label { color: #aaaaaa; }
        .value { color: #00ffcc; font-weight: bold; }
        .warning { color: #ff3366; font-weight: bold; animation: blink 1s infinite; }
        
        @keyframes blink { 50% { opacity: 0; } }

        /* 自訂無人機的圖示（用 CSS 畫一個三角形箭頭，方便旋轉看 Yaw） */
        .drone-icon {
            width: 0; height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 24px solid #ff3366; /* 機頭是紅色的 */
            transform-origin: 50% 50%;
            transition: transform 0.2s linear; /* 讓轉向滑順 */
        }
        /* 一鍵鎖定按鈕 */
        #center-btn {
            position: absolute;
            bottom: 40px;
            right: 20px;
            z-index: 1000;
            background-color: #00ffcc;
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.4);
            transition: all 0.2s ease;
        }
        #center-btn:hover {
            transform: scale(1.1);
            background-color: #00ccaa;
        }
    </style>
</head>
<body>

    <div id="dashboard">
        <h3 style="margin-top: 0; color: #fff; text-align: center; border-bottom: 1px solid #444; padding-bottom: 10px;">🛸 空母遙測狀態</h3>
        <div class="data-row"><span class="label">連線狀態:</span> <span id="ws-status" style="color: yellow;">連線中...</span></div>
        <div class="data-row"><span class="label">衛星數量 (Sats):</span> <span id="sats" class="value">0</span></div>
        <div class="data-row"><span class="label">主電源 (Vol):</span> <span id="vol" class="value">0.0 V</span></div>
        <div class="data-row"><span class="label">高度 (Alt):</span> <span id="alt" class="value">0.0 m</span></div>
        <div class="data-row"><span class="label">升降 (VSpd):</span> <span id="vspd" class="value">0.0 m/s</span></div>
        <div class="data-row"><span class="label">偏航角 (Yaw):</span> <span id="yaw" class="value">0°</span></div>
        <div class="data-row"><span class="label">失控保護 (FS):</span> <span id="fs" class="value">安全</span></div>
    </div>

    <div id="map"></div>
    <button id="center-btn">🎯 鎖定空母</button>

    <script>
        // 1. 初始化地圖 (預設定位在台灣正中央)
        const map = L.map('map').setView([23.6978, 120.9605], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        // 2. 建立無人機的「自訂 HTML 圖示」
        const droneDivIcon = L.divIcon({
            className: 'custom-drone-container',
            html: '<div class="drone-icon" id="drone-arrow"></div>',
            iconSize: [24, 24],
            iconAnchor: [12, 12]
        });

        // 在地圖上放上無人機圖釘 (初始位置隱藏，等收到 GPS 才顯示)
        let droneMarker = L.marker([23.6978, 120.9605], { icon: droneDivIcon, opacity: 0 }).addTo(map);
        let isFirstLocation = true;
        let currentDroneLatLng = null; // 用來隨時記住空母的最新座標
        let currentDroneYaw = 0;
        let isFollowing = true;

        function setMapRotation(angle) {
            const mapEl = document.getElementById('map');
            mapEl.style.transform = `rotate(${-angle}deg)`;
        }

        function updateCenterButton() {
            const btn = document.getElementById('center-btn');
            if (isFollowing) {
                btn.innerText = '🔒 跟隨空母';
                btn.style.backgroundColor = '#00ffcc';
                btn.style.color = '#000';
            } else {
                btn.innerText = '🎯 鎖定空母';
                btn.style.backgroundColor = '#ffcc00';
                btn.style.color = '#000';
            }
        }

        map.on('dragstart zoomstart', () => {
            if (isFollowing) {
                isFollowing = false;
                setMapRotation(0);
                updateCenterButton();
            }
        });

        // =================================================================
        // 🚨 總工程師注意：已改成你的 Render 伺服器網址
        // =================================================================
        const wsUrl = 'wss://five50-drone-telemetry.onrender.com'; 
        
        let ws;
        function connectWebSocket() {
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                document.getElementById('ws-status').innerText = '已連線 🟢';
                document.getElementById('ws-status').style.color = '#00ffcc';
            };

            ws.onmessage = (event) => {
                try {
                    // 解析從 Render 轉發過來的 ESP32 JSON 封包
                    const data = JSON.parse(event.data);
                    
                    // 1. 更新儀表板數據
                    document.getElementById('sats').innerText = data.sats;
                    document.getElementById('vol').innerText = data.vol.toFixed(1) + ' V';
                    document.getElementById('alt').innerText = data.alt.toFixed(1) + ' m';
                    document.getElementById('vspd').innerText = data.vspd.toFixed(2) + ' m/s';
                    document.getElementById('yaw').innerText = data.yaw + '°';
                    
                    // 處理失控保護警報
                    const fsElement = document.getElementById('fs');
                    if (data.fs === 1) {
                        fsElement.innerText = '⚠️ 訊號遺失';
                        fsElement.className = 'warning';
                    } else {
                        fsElement.innerText = '安全';
                        fsElement.className = 'value';
                    }

                    // 2. 更新地圖上的圖釘位置
                    if (data.lat !== 0 && data.lon !== 0) {
                        const newLatLng = new L.LatLng(data.lat, data.lon);
                        currentDroneLatLng = newLatLng; // 👈 每次收到新座標，就偷偷記下來
                        currentDroneYaw = data.yaw;
                        droneMarker.setLatLng(newLatLng);
                        droneMarker.setOpacity(1); // 收到真實座標後顯示出來

                        // 如果是第一次收到座標，把地圖視角移過去
                        if (isFirstLocation) {
                            map.setView(newLatLng, 18);
                            isFirstLocation = false;
                        }

                        if (isFollowing) {
                            map.flyTo(newLatLng, 18, { animate: true, duration: 0.5 });
                            setMapRotation(data.yaw);
                        } else {
                            setMapRotation(0);
                        }

                        // 3. 旋轉機頭 (Yaw)
                        const arrow = document.getElementById('drone-arrow');
                        if (arrow) {
                            // arrow 旋轉成真實航向，讓鎖定時畫面也能朝上
                            arrow.style.transform = `rotate(${data.yaw}deg)`;
                        }
                    }

                } catch (e) {
                    console.log('收到非 JSON 格式的訊息:', event.data);
                }
            };

            ws.onclose = () => {
                document.getElementById('ws-status').innerText = '斷線重連中 🔴';
                document.getElementById('ws-status').style.color = '#ff3366';
                setTimeout(connectWebSocket, 3000); // 斷線 3 秒後自動重連
            };
        }

        // 綁定「鎖定空母」按鈕的點擊事件
        document.getElementById('center-btn').addEventListener('click', () => {
            if (currentDroneLatLng) {
                isFollowing = true;
                updateCenterButton();
                setMapRotation(currentDroneYaw);
                map.flyTo(currentDroneLatLng, 18, {
                    animate: true,
                    duration: 1.2
                });
            } else {
                const btn = document.getElementById('center-btn');
                const originalText = btn.innerText;
                btn.innerText = '⚠️ 尚未定位';
                btn.style.backgroundColor = '#ff3366';
                btn.style.color = 'white';
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.backgroundColor = '#00ffcc';
                    btn.style.color = '#000';
                }, 2000);
            }
        });

        updateCenterButton();
        // 啟動連線！
        connectWebSocket();
    </script>
</body>
</html>
